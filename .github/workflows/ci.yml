name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Node.js 20 deprecation (forced removal 2026-09-16) 대비 — 액션 호스트
# Node 를 24 로 전환. actions/checkout@v4 / setup-node@v4 는 Node 20
# bundle 사용하지만 이 env 가 24 로 강제 실행함.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://vdprfnhwdbrwdbjmbjfy.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_wYsTQ7Og_BeMclYN8ZFSNg_3EwX1GPB
